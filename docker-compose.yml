services:
  db:
    image: postgres:15
    container_name: sonaris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonaris
      POSTGRES_USER: sonaris
      POSTGRES_PASSWORD: sonaris
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonaris -d sonaris && echo 'PostgreSQL ready'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sonaris-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sonaris-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://sonaris:sonaris@db:5432/sonaris
      CORS_ORIGINS: '["http://localhost:3000"]'
      SECRET_KEY: development-secret
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sonaris-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sonaris-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - sonaris-network

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  sonaris-network:
    driver: bridge
