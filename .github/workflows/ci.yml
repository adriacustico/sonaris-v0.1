name: CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install black==24.10.0 flake8==7.1.1

      - name: Run flake8
        run: flake8 backend --max-line-length=120 --extend-ignore=E203,W503

      - name: Run black format check
        run: black --check --diff --line-length=120 backend

      - name: Run pytest with coverage
        working-directory: backend
        run: pytest tests engine/tests --cov=app --cov=engine --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: backend/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Run build
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests if configured
        working-directory: frontend
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm run test
          else
            echo "No frontend test script configured; skipping."
          fi

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: sonaris-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: sonaris-frontend:ci

  notify-pr:
    name: Notify Pull Request
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Comment CI result
        uses: actions/github-script@v7
        with:
          script: |
            const failed = Object.values(${{ toJson(needs) }}).some((job) => job.result !== "success");
            const body = failed
              ? "❌ CI/CD falló. Revisa los jobs de backend/frontend antes de mergear."
              : "✅ Todos los tests pasaron";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
